<div class="flex flex-col items-center justify-center p-10 bg-indigo-50 rounded-2xl border-2 border-dashed border-indigo-200"
     hx-get="{% url 'task:conversion_status' task_id %}" 
     hx-trigger="every 2s" 
     hx-target="this" 
     hx-swap="outerHTML">
    
    <div class="relative">
        <div class="animate-spin rounded-full h-16 w-12 border-b-2 border-indigo-600"></div>
        <div class="absolute inset-0 flex items-center justify-center">
            <span class="text-[10px] font-bold text-indigo-600">AI</span>
        </div>
    </div>
    
    <p class="mt-4 text-indigo-700 font-semibold animate-pulse">
        Gemini is rewriting your story...
    </p>
    <p class="text-xs text-indigo-400">This usually takes 10-20 seconds.</p>
</div>
