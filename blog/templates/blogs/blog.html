{% extends "base.html" %}
{% block content %}
{% load markdownify %}

<div class="mx-auto px-4 py-8 bg-white max-w-4xl" x-data="{ activeTab: 'story' }">
    <header class="mb-6">
        <h1 class="text-center text-4xl font-extrabold mb-4">{{ blog.title }}</h1>
        
        <div class="flex items-center border-b border-gray-200">
            <button @click="activeTab = 'story'" 
                :class="activeTab === 'story' ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-gray-500'"
                class="px-6 py-3 text-sm font-semibold border-b-2 transition-all">
                Story
            </button>
            <button @click="activeTab = 'ai'" 
                :class="activeTab === 'ai' ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-gray-500'"
                class="px-6 py-3 text-sm font-semibold border-b-2 transition-all">
                AI Writer
            </button>
        </div>
    </header>

    <div x-show="activeTab === 'story'" x-cloak class="py-6">
        <article class="prose lg:prose-xl max-w-none text-gray-800">
            {{ blog.content|markdownify }}
        </article>
    </div>

    <div x-show="activeTab === 'ai'" x-cloak class="py-6">
        <div class="bg-gray-50 p-6 rounded-2xl border border-gray-100 shadow-sm">
            <h3 class="text-lg font-bold mb-3 text-gray-700">AI Transformation</h3>
            
            <form hx-post="{% url 'task:ai_writing' %}" 
                  hx-target="#ai-content-area" 
                  hx-swap="innerHTML"
                  class="space-y-4">
                {% csrf_token %}
                <input hidden name="blog_id" value="{{ blog.id }}" />
                <textarea name="prompt" rows="3" 
                    class="w-full p-4 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none resize-none"
                    placeholder="" required>Summerize this blog in simple words.</textarea>
                
                <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-blue-700 flex items-center gap-2">
                    Transform
                </button>
            </form>

            <div id="ai-content-area" class="mt-8 prose lg:prose-xl text-gray-700">
                <p class="italic text-gray-400">Waiting for your prompt...</p>
            </div>
        </div>
    </div>
</div>

<style> [x-cloak] { display: none !important; } </style>
{% endblock %}
