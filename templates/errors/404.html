{% extends "base.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-900 via-indigo-800 to-indigo-950 text-white px-6">
    <div class="text-center max-w-xl">
        
        <!-- Robot Avatar -->
        <div class="flex justify-center mb-6">
            <img 
                src="https://api.dicebear.com/7.x/bottts/svg?seed=sapphire404" 
                alt="404 Robot"
                class="w-32 h-32 rounded-full bg-white p-2 shadow-lg"
            />
        </div>

        <!-- Error Code -->
        <h1 class="text-8xl font-extrabold tracking-widest text-indigo-300">404</h1>

        <!-- Message -->
        <h2 class="text-2xl font-semibold mt-4">Page Not Found</h2>
        <p class="mt-3 text-indigo-200">
            Looks like you tried to access a route that doesn’t exist in this universe 🌌  
            The blog post might be moved, deleted, or never existed.
        </p>

        <!-- Actions -->
        <div class="mt-8 flex justify-center gap-4">
            <a href="{% url 'blog:home_page' %}" 
               class="px-6 py-3 rounded-lg bg-indigo-600 hover:bg-indigo-500 transition font-semibold shadow-md">
                ← Back to Home
            </a>

            <a href="{% url 'blog:home_page' %}" 
               class="px-6 py-3 rounded-lg border border-indigo-400 hover:bg-indigo-800 transition font-semibold">
                Browse Blogs
            </a>
        </div>

        <!-- Footer Note -->
        <p class="mt-8 text-sm text-indigo-300 opacity-70">
            Flogg • Developer-First Blogging Platform
        </p>
    </div>
</div>
{% endblock %}
